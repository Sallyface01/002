workflows:
  fishbuddy-android:
    name: FishBuddy Android Build
    max_build_duration: 60
    environment:
      java: 17
      android_sdk: 35
    scripts:
      - name: Fix Gradle Wrapper
        script: |
          # Ensure exec permission (sometimes lost from Windows git)
          chmod +x gradlew

          # Validate wrapper jar; if corrupted by git, download a fresh one
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo ">> gradle-wrapper.jar is corrupted, downloading fresh copy..."
            curl -sSL "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o /tmp/gradle.zip
            unzip -qo /tmp/gradle.zip "gradle-8.9/lib/gradle-wrapper-8.9.jar" -d /tmp/gradle-extract/
            cp /tmp/gradle-extract/gradle-8.9/lib/gradle-wrapper-8.9.jar gradle/wrapper/gradle-wrapper.jar
            echo ">> gradle-wrapper.jar replaced OK"
          else
            echo ">> gradle-wrapper.jar is valid"
          fi
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
